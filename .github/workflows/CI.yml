name: Build e push da imagem

#Definindo o gatilho para a ação: neste caso, configurado para o push. Em ambientes produtivos, o ideal, na minha visão, é que esse fluxo seja no PR.
on:
    push:
      branches: [ "main" ]

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Install dependencies
          run: npm ci

        - name: Run tests
          run: npm test

          #Feito como docker hub - Mas podemos usar ECR da AWS tbm.
        - name: RepoImage
          run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin


        - name: Build da imagem
          run: docker build -t usuario/node-api:${{ github.sha }} .


        - name: Push da imagem
          run: docker push usuario/node-api:${{ github.sha }}


        - name: Update no repo de GitOps
          run: |
            git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/fw356c/Live-testeGitOps.git
            cd Live-testeGitOps
            sed -i 's|image:.*|image: usuario/node-api:${{ github.sha }}|' k8s/deployment.yaml
            git commit -am "Update image to ${{ github.sha }}"
            git push